<!DOCTYPE html>

<html lang="en">

{% load static %}

<head>
    <title>{% block title %}{% endblock %}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="{% static 'css/app.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}?v=9">
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">

    {% if DEBUG %}
    {# Distinct favicon for local/dev so it's easy to tell apart from production tabs #}
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%2316a34a'/><text x='32' y='47' font-size='42' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial,sans-serif'>Q</text></svg>"/>
    {% else %}
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    {% endif %}

    <link href='http://fonts.googleapis.com/css?family=Montserrat:400,700' rel='stylesheet' type='text/css'>
    <link href='http://fonts.googleapis.com/css?family=Karla:400,400italic,700,700italic' rel='stylesheet' type='text/css'>

    <script src="{% static 'foundation/js/vendor/jquery.js' %}"></script>
    <script src="{% static 'foundation/js/vendor/jquery.cookie.js' %}"></script>
    <script src="{% static 'foundation/js/vendor/modernizr.js' %}"></script>
    <script src="{% static 'jquery-ui/jquery-ui.min.js' %}"></script>
    <script src="{% static 'underscore/underscore-min.js' %}"></script>
    <script src="{% static 'tablesorter/jquery.tablesorter.js' %}"></script>
    <script src="{% static 'sprintf/src/sprintf.js' %}"></script>
    <script src="{% static 'expanding-textareas/expanding.js' %}"></script>
    <script src="{% static 'js/qsub.js' %}"></script>
</head>

<body>
    
    {% block header %}{% endblock %}
    <div class="row">
        <div class="small-11 small-centered columns">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="{% static 'js/paste_convert.js' %}?v=9"></script>
    <script src="{% static 'js/rich_editor.js' %}?v=7"></script>
    <script src="{% static 'foundation/js/foundation.min.js' %}"></script>
    <script>
        $(document).foundation({
            tab: {
                deep_linking:true,
                scroll_to_content:false,
            },
        });
    </script>
</body>
</html>
